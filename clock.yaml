esphome:
  name: clock
  friendly_name: Clock
  name_add_mac_suffix: True

esp32:
  board: seeed_xiao_esp32c3

packages: !include common/base.yaml
api:
captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True
  ap:
    ssid: Clock Fallback Hotspot

globals:
  - id: identify_active
    type: bool
    initial_value: "false"

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

font:
  - file: fonts/5x8.bdf
    id: font_default

time:
  - platform: sntp
    timezone: Europe/Berlin
    id: time_sntp

display:
  - platform: max7219digit
    id: clock_display
    cs_pin: GPIO20
    num_chips: 4
    rotate_chip: 180
    reverse_enable: True
    update_interval: 20ms
    lambda: |-
      auto t = id(time_sntp).now();
      if (id(identify_active)) {
        it.turn_on_off(true);
        it.intensity(15);
        it.filled_rectangle(0, 0, 32, 8);
        return;
      }
      it.turn_on_off(id(clock_light).current_values.is_on());
      it.intensity((int)(id(clock_light).current_values.get_brightness() * 15));
      it.strftime(4, 0, id(font_default), t.second % 2 == 0 ? "%H:%M" : "%H %M", t);

output:
  - platform: template
    id: clock_light_output
    type: float
    write_action:
      - lambda: ""

light:
  - platform: monochromatic
    name: "Display"
    output: clock_light_output
    id: clock_light
    default_transition_length: 400ms
    icon: mdi:clock-digital
    restore_mode: RESTORE_AND_ON

button:
  - platform: template
    name: Identify
    device_class: identify
    entity_category: diagnostic
    on_press:
      then:
        - globals.set:
            id: identify_active
            value: 'true'
        - delay: 5s
        - globals.set:
            id: identify_active
            value: 'false'
